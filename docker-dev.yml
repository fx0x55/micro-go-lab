services:
  # === Infrastructure ===
  etcd:
    image: gcr.io/etcd-development/etcd:v3.6.13
    command: etcd --advertise-client-urls http://etcd:2379 --listen-client-urls http://0.0.0.0:2379
    ports:
      - "2379:2379"
      - "2380:2380"
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "8589934592"
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 5s
      timeout: 5s
      retries: 5

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: users_db
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./deploy/mysql/init-dbs.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # === Kafka (3-node KRaft cluster) ===
  kafka-1:
    image: apache/kafka:4.0.0
    ports:
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: micro-go-lab-kafka-cluster
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10

  kafka-2:
    image: apache/kafka:4.0.0
    ports:
      - "9095:9095"
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9095
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-2:9092,EXTERNAL://localhost:9095
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: micro-go-lab-kafka-cluster
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10

  kafka-3:
    image: apache/kafka:4.0.0
    ports:
      - "9096:9096"
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9096
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-3:9092,EXTERNAL://localhost:9096
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: micro-go-lab-kafka-cluster
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10

  # === Monitoring (docker compose --profile monitoring up) ===
  kafka-ui:
    profiles: ["monitoring"]
    image: ghcr.io/kafbat/kafka-ui:v1.5.0
    ports:
      - "8888:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: micro-go-lab
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-1:9092,kafka-2:9092,kafka-3:9092
    depends_on:
      - kafka-1
      - kafka-2
      - kafka-3

  alertmanager:
    profiles: ["monitoring"]
    image: prom/alertmanager:v0.33.0
    ports:
      - "9093:9093"
    # 占位环境变量：alertmanager.yml 里 chat_id 需要插值成 int，
 # 若未提供真实 TELEGRAM_* 凭据，这里给默认值让容器能启动（告警发不出去但会进日志）。
 # 配真实 Telegram 通知时，用 .env / 环境覆盖这两个值即可。
    environment:
      - TELEGRAM_BOT_TOKEN=placeholder
      # chat_id 用非零值（0 会被 alertmanager 判为缺失），配真实通知时覆盖即可。
      - TELEGRAM_CHAT_ID=1
    volumes:
      - ./deploy/alertmanager:/etc/alertmanager:ro
    # alertmanager 0.33 不原生支持 ${VAR} 插值；本地 dev 用 sed 把模板里的
    # ${TELEGRAM_*} 占位符替换成 environment 的值（默认占位），写到 /tmp 再加载。
    # 生产版走 docker-compose.yml 的真实凭据注入。
    user: "0"
    entrypoint:
      - /bin/sh
      - -c
      - sed 's|$${TELEGRAM_BOT_TOKEN}|'"$$TELEGRAM_BOT_TOKEN"'|g; s|$${TELEGRAM_CHAT_ID}|'"$$TELEGRAM_CHAT_ID"'|g' /etc/alertmanager/alertmanager.yml > /tmp/am.yml && exec alertmanager --config.file=/tmp/am.yml --storage.path=/alertmanager
    restart: unless-stopped

  prometheus:
    profiles: ["monitoring"]
    image: prom/prometheus:v3.13.0
    ports:
      - "9091:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/prometheus/rules.yml:/etc/prometheus/rules.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.external-url=http://localhost:9091"
      - "--web.enable-lifecycle"
    depends_on:
      - alertmanager

  grafana:
    profiles: ["monitoring"]
    image: grafana/grafana:13.1.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
      - loki

  jaeger:
    profiles: ["monitoring"]
    image: jaegertracing/jaeger:2.19.0
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"

  loki:
    profiles: ["monitoring"]
    image: grafana/loki:3.7.3
    ports:
      - "3100:3100"
    volumes:
      - ./deploy/loki/config.yml:/etc/loki/config.yml:ro
      - ./deploy/loki/rules:/etc/loki/rules:ro
    command: -config.file=/etc/loki/config.yml
    depends_on:
      - alertmanager

  promtail:
    profiles: ["monitoring"]
    image: grafana/promtail:3.5.5
    volumes:
      - ./deploy/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

volumes:
  mysql-data:
