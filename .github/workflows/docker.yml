name: Docker

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./... -v -race
        env:
          JWT_SECRET: test-secret-for-ci

      - name: Build Docker image
        run: docker build --target user-api -t user-api:${{ github.ref_name }} .

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to GHCR
        run: |
          docker tag user-api:${{ github.ref_name }} ghcr.io/${{ github.repository }}/user-api:${{ github.ref_name }}
          docker tag user-api:${{ github.ref_name }} ghcr.io/${{ github.repository }}/user-api:latest
          docker push ghcr.io/${{ github.repository }}/user-api:${{ github.ref_name }}
          docker push ghcr.io/${{ github.repository }}/user-api:latest
