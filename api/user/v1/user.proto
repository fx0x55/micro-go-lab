syntax = "proto3";

package user.v1;

option go_package = "github.com/fx0x55/micro-go-lab/service/user/rpc/pb;pb";

// UserService 提供给其他微服务调用的 gRPC 接口
service UserService {
  // ValidateUser 验证用户是否存在
  rpc ValidateUser(ValidateUserRequest) returns (ValidateUserResponse);
  // GetUser 获取用户信息
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  // CreateUser 创建用户（注册），明文密码入参，哈希不出 user-rpc
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
  // Authenticate 校验用户名+密码，返回身份（不返回哈希）
  rpc Authenticate(AuthenticateRequest) returns (AuthenticateResponse);
}

message ValidateUserRequest {
  uint64 user_id = 1;
}

message ValidateUserResponse {
  bool exists = 1;
  string username = 2; // 用户存在时返回用户名，供调用方避免二次查询
}

message GetUserRequest {
  uint64 user_id = 1;
}

message GetUserResponse {
  uint64 id = 1;
  string username = 2;
  string email = 3;
}

message CreateUserRequest {
  string username = 1;
  string password = 2; // 明文，user-rpc 内部 bcrypt
  string email = 3;
}

message CreateUserResponse {
  uint64 id = 1;
  string username = 2;
  string email = 3;
}

message AuthenticateRequest {
  string username = 1;
  string password = 2;
}

message AuthenticateResponse {
  // exists=false 表示用户名或密码错误（不区分以防枚举攻击）
  bool exists = 1;
  uint64 id = 2;
  string username = 3;
}
