Name: user-svc
Host: 0.0.0.0
Port: 8080
Mode: dev

GRPCConf:
  Port: 9090
  Etcd:
    Hosts:
      - localhost:2379
    Key: user-svc.rpc

Database:
  Host: localhost
  Port: 5432
  User: postgres
  Password: postgres
  DBName: users_db
  MaxOpenConns: 25
  MaxIdleConns: 10

JWT:
  Secret: change-me-in-production
  Expiration: 24h
