Name: user-svc
Host: 0.0.0.0
Port: 8080
Mode: dev

GRPC:
  ListenOn: 0.0.0.0:9090
  Etcd:
    Hosts:
      - localhost:2379
    Key: user-svc.rpc

Database:
  Host: localhost
  Port: 5432
  User: postgres
  Password: postgres
  DBName: users_db
  MaxOpenConns: 25
  MaxIdleConns: 10

JWT:
  Secret: change-me-in-production
  Expiration: 24h

Prometheus:
  Host: 0.0.0.0
  Port: 9101
  Path: /metrics

Telemetry:
  OTLPEndpoint: localhost:4317
