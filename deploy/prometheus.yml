global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: "user-api"
    static_configs:
      - targets: ["host.docker.internal:9101"]

  - job_name: "order-api"
    static_configs:
      - targets: ["host.docker.internal:9102"]

  - job_name: "user-rpc"
    static_configs:
      - targets: ["host.docker.internal:9103"]
