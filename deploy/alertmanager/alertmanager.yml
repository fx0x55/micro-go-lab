# Alertmanager 配置：负责告警的去重、分组、路由、抑制，并直接分发到 Telegram。
#
# 告警流向：
#
#   Prometheus / Loki 规则 → Alertmanager（去重 + 分组 + 路由 + 抑制）→ Telegram Bot
#
# ── Telegram 对接说明 ────────────────────────────────────────────────────────
# Alertmanager 0.24+ 原生支持 telegram_configs，直接调用 Telegram Bot API，
# 无需像飞书那样架设格式转换代理。
#
# 准备工作：
#   1. 在 Telegram 里 @BotFather → /newbot 创建机器人，拿到 bot_token。
#   2. 把机器人加入目标群组/频道，并给到发送消息权限。
#   3. 获取 chat_id：
#        - 私聊：把机器人随便发条消息，访问
#          https://api.telegram.org/bot<TOKEN>/getUpdates，读 result[].message.chat.id。
#        - 群组：把机器人拉进群，同样调 getUpdates，chat.id 为负数（形如 -1001234567890）。
#   4. 在项目根目录创建 .env 文件（参考 .env.example），填入：
#        TELEGRAM_BOT_TOKEN=123456789:ABCdefGhI...
#        TELEGRAM_CHAT_ID=-1001234567890
#      .env 已在 .gitignore 中，不会被提交。
#   4. 把凭据写入文件（alertmanager 原生 *_file 读取方式）：
#        cp -r deploy/alertmanager/secrets.example deploy/alertmanager/secrets
#        echo -n "123456789:ABCdefGhI..." > deploy/alertmanager/secrets/telegram_bot_token
#        echo -n "-1001234567890"      > deploy/alertmanager/secrets/telegram_chat_id
#      deploy/alertmanager/secrets/ 已在 .gitignore 中，不会被提交。
#
# 网络注意：Telegram Bot API（api.telegram.org）在大陆默认不可直连。
#   - 容器有透明代理 / 走海外节点时无需改动；
#   - 否则用 api_url 指向一个可访问的 Telegram Bot API 反代地址（见下 receivers）。
#
# 凭据走 alertmanager 原生的 *_file 字段（bot_token_file / chat_id_file）：
# 启动时从 /etc/alertmanager/secrets/ 读文件内容，无需任何 sed/env 插值。
# 文件由 docker-compose(-dev).yml 从 deploy/alertmanager/secrets/ 挂载，
# 该目录已 gitignore；首次 setup 参考 deploy/alertmanager/secrets.example/。

templates:
  - "/etc/alertmanager/telegram.tmpl"

global:
  # 已恢复告警仍发送 resolve 通知的最长等待时间
  resolve_timeout: 5m

# 根路由：所有告警先匹配子路由，未命中则走 default。
route:
  receiver: "default"
  group_by: ["alertname", "job", "severity"]
  # 首次告警等待窗口：同组告警在此窗口内合并，避免风暴时逐条轰炸
  group_wait: 30s
  # 同组后续告警的合并间隔
  group_interval: 5m
  # 同一告警重复通知的最小间隔（4h = 一个值班班次内最多提醒一次）
  repeat_interval: 4h
  routes:
    # critical：立即通知，不等待 group_wait
    - matchers: ["severity=critical"]
      receiver: "critical"
      group_wait: 0s
      repeat_interval: 1h
    # warning：按组批量通知
    - matchers: ["severity=warning"]
      receiver: "warning"

receivers:
  # 所有 receiver 直接通过 Telegram Bot API 推送到目标 chat。
  # severity 路由在 Alertmanager 层完成，统一发到同一个 Telegram 群。
  # bot_token / chat_id 走 *_file：alertmanager 启动时从挂载的文件读取，
  # 是官方处理 secret 的标准方式（兼容 docker secrets / k8s secret / vault）。
  # 文件由 docker-compose(-dev).yml 从 deploy/alertmanager/secrets/ 挂载，
  # 真实值维护在该目录（已 gitignore）；协作者首次 setup 见 secrets.example/。
  #
  # 关于 api_url：默认 https://api.telegram.org。如容器无法直连 Telegram，
  # 取消注释并改成可达的反代地址（反代需转发到 https://api.telegram.org）。
  - name: "default"
    telegram_configs:
      - bot_token_file: /etc/alertmanager/secrets/telegram_bot_token
        chat_id_file: /etc/alertmanager/secrets/telegram_chat_id
        message_thread_id: 9
        send_resolved: true
        parse_mode: "HTML"
        message: '{{ template "tg.message" . }}'

  - name: "critical"
    telegram_configs:
      - bot_token_file: /etc/alertmanager/secrets/telegram_bot_token
        chat_id_file: /etc/alertmanager/secrets/telegram_chat_id
        message_thread_id: 7
        send_resolved: true
        parse_mode: "HTML"
        message: '{{ template "tg.message" . }}'

  - name: "warning"
    telegram_configs:
      - bot_token_file: /etc/alertmanager/secrets/telegram_bot_token
        chat_id_file: /etc/alertmanager/secrets/telegram_chat_id
        message_thread_id: 4
        send_resolved: true
        parse_mode: "HTML"
        message: '{{ template "tg.message" . }}'

# 抑制规则：根因告警触发时，压制它引发的"症状告警"，减少噪声。
inhibit_rules:
  # 服务整体不可用时，压制该服务派生的错误率/延迟告警（它们只是症状）
  - source_matchers: ['alertname="ServiceDown"']
    target_matchers: ['severity=~"warning|info"']
    equal: ["job"]
  # DB 连接池耗尽时，压制派生的业务错误率告警
  - source_matchers: ['alertname="DBConnectionSaturation"']
    target_matchers: ['alertname="HighErrorRate"']
    equal: ["job"]
