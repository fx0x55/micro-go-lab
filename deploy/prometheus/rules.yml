# 告警规则 + Recording rules。
# 命名约定：service:metric_name:window 形式的 record 供告警与 Grafana Dashboard 共用，
# 保证"图表上看到的"和"触发告警的"是同一个表达式，避免语义漂移。

groups:
  # ── Recording rules ──────────────────────────────────────────────────────
  # 预计算表达式：告警与 Dashboard 共用同一组指标，查询更便宜、语义一致。
  - name: recording_rules
    rules:
      - record: job:http_5xx_rate:5m
        expr: sum(rate(http_server_requests_code_total{code=~"5.."}[5m])) by (job)
      - record: job:http_request_rate:5m
        expr: sum(rate(http_server_requests_code_total[5m])) by (job)
      - record: job:http_error_ratio:5m
        expr: job:http_5xx_rate:5m / clamp_min(job:http_request_rate:5m, 1)
      - record: job:http_p99_latency_ms:5m
        expr: histogram_quantile(0.99, sum(rate(http_server_requests_duration_ms_bucket[5m])) by (le, job))
      - record: job:db_conn_usage_ratio
        expr: go_sql_in_use_connections{db!=""} / clamp_min(go_sql_max_open_connections{db!=""}, 1)

  # ── RED 告警 ─────────────────────────────────────────────────────────────
  - name: error_rate_alerts
    rules:
      - alert: HighErrorRate
        expr: job:http_error_ratio:5m > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.job }} 过半请求报错（{{ $value | humanizePercentage }}），用户侧可感知"
          description: >-
            影响：{{ $value | humanizePercentage }} 的请求返回 5xx，用户正在遇到服务错误。
            ① Grafana → RED 面板 → 按 path 拆分，定位哪个接口的错误率最高。
            ② 查对应服务日志：{service="{{ $labels.job }}"} | json | level="error"
            ③ 检查是否为近期发布引起（Jaeger 看错误 trace 的时间线）。
            常见根因：新版本 bug / 下游 RPC 超时 / 数据库连接失败。

  - name: latency_alerts
    rules:
      - alert: HighLatencyP99
        expr: job:http_p99_latency_ms:5m > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.job }} p99 延迟飙至 {{ $value }}ms，用户已明显感知卡顿"
          description: >-
            影响：最慢 1% 的请求耗时超过 1 秒，用户会感到页面卡顿或请求超时。
            ① Grafana → RED 面板 → 按 path 看哪个接口拖慢了整体 p99。
            ② Jaeger → 筛选 duration>1s 的 trace，找到最慢的 span。
            ③ 检查 DB 慢查询：{service="{{ $labels.job }}"} | json | msg~"slow"
            常见根因：N+1 查询 / 缺少索引 / 下游 RPC 变慢 / GC 停顿。

  # ── 依赖与熔断 ────────────────────────────────────────────────────────────
  - name: circuit_breaker_alerts
    rules:
      - alert: CircuitBreakerOpen
        expr: increase(rpc_calls_breaker_open_total[5m]) > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "熔断器已打开，{{ $labels.method }} RPC 调用被拒绝，订单服务受阻"
          description: >-
            影响：下游 RPC 连续失败触发熔断，所有经过该 RPC 的业务请求直接失败。
            当前状态：过去 5 分钟有 {{ $value }} 次调用被熔断器拒绝。
            ① 确认下游服务状态：访问 Jaeger → 搜索 user-rpc 相关 trace，看是否有超时或错误。
            ② 检查 user-rpc 日志：{service="user-rpc"} | json | level="error"
            ③ 确认 etcd 中 user-rpc 实例健康：etcdctl get --prefix /services/user-svc.rpc/
            常见根因：下游服务宕机 / 数据库不可达 / 网络分区。
            恢复：下游恢复后 go-zero 熔断器自动半开探测，无需手动干预。

  # ── 数据库 ────────────────────────────────────────────────────────────────
  - name: database_alerts
    rules:
      - alert: DBConnectionSaturation
        expr: job:db_conn_usage_ratio > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.db }} 连接池使用率达 {{ $value | humanizePercentage }}，即将耗尽"
          description: >-
            影响：连接池即将打满，后续请求会排队等待连接，导致延迟上升直至超时。
            ① Grafana → DB 面板 → 查 in_use / open / idle 趋势，确认是否有突增。
            ② 查慢查询：{service=~"user-.*|order-.*"} | json | msg~"slow"
            ③ 检查连接池配置：MaxOpenConns 是否过小（默认无限制），是否有连接泄漏。
            常见根因：慢查询占用连接时间过长 / 并发突增 / 连接未正确释放（tx 未提交或回滚）。

  # ── 可用性 ────────────────────────────────────────────────────────────────
  - name: availability_alerts
    rules:
      # 服务连续 1 分钟抓取失败：最优先的 critical 告警（其他告警的前提）
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.instance }} 已失联 1 分钟，{{ $labels.job }} 服务完全不可观测"
          description: >-
            影响：Prometheus 无法抓取该实例的 /metrics，所有指标中断，相关告警可能漏报。
            ① 确认容器状态：docker ps | grep {{ $labels.job }}，是否在重启循环中。
            ② 检查服务日志：docker logs {{ $labels.instance }} --tail 100
            ③ 确认端口可达：curl http://{{ $labels.instance }}/metrics
            常见根因：进程 panic / OOM 被 kill / 端口冲突 / 健康检查持续失败导致容器重启。

      # 抓取本身频繁失败（目标存活但 /metrics 不稳），早于数据空洞
      - alert: ScrapeFailureRate
        expr: rate(prometheus_target_scrape_pool_targets{state="down"}[5m]) > 0
        for: 5m
        labels:
          severity: info
        annotations:
          summary: "Prometheus 抓取目标持续不可达，指标可能出现空洞"
          description: >-
            影响：部分实例的指标采集不稳定，Grafana 面板可能出现断点，相关告警可能漏报。
            ① Prometheus UI → Status → Targets，查看哪些 target 状态为 DOWN。
            ② 确认目标实例是否在重启中：docker ps --filter health=unhealthy
            ③ 检查网络：从 Prometheus 容器内 curl 目标 /metrics。
            常见根因：服务部署中短暂不可用 / 网络抖动 / scrape_timeout 设置过短。

  # ── 异步管道健康 ──────────────────────────────────────────────────────────
  - name: pipeline_alerts
    rules:
      # Outbox 事件积压：连续 10 分钟发布失败未恢复
      - alert: OutboxStuck
        expr: sum(rate(outbox_events_published_total{result="error"}[5m])) > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Outbox 事件持续 10 分钟发布失败，异步流程全部阻塞"
          description: >-
            影响：依赖事件驱动的下游流程（如通知、数据同步）全部停摆，业务数据可能不一致。
            ① 查日志中的发布错误：{service=~"user-.*|order-.*"} | json | msg~"outbox.*publish"
            ② 确认 Redis 连接：docker exec redis redis-cli ping
            ③ 检查 outbox 表是否有大量未发布记录（可能需要手动查看 DB）。
            常见根因：Redis 连接断开 / outbox 表死锁 / poller goroutine panic 退出。

      # Redis Stream 消费持续失败：消费者侧处理报错
      - alert: StreamConsumeErrorRate
        expr: sum(rate(redis_stream_messages_consumed_total{result="error"}[5m])) by (topic, group) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.topic }} 消费持续失败（{{ $labels.group }}），消息正在堆积"
          description: >-
            影响：stream 消息堆积，下游处理延迟不断增长，超过 maxlen 后消息会丢失。
            ① 查消费错误日志：{service=~"user-.*|order-.*"} | json | msg~"consume.*error"
            ② 查看 stream 积压：docker exec redis redis-cli XINFO STREAM {{ $labels.topic }}
            ③ 检查最近是否有代码变更影响了消费者逻辑。
            常见根因：消费者代码 bug（panic/类型断言失败）/ 处理依赖不可用 / 死信队列未配置。
            恢复：修复消费者代码后重新部署；积压消息会被自动消费。
