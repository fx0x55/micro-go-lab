Name: order-api
Host: 0.0.0.0
Port: 8081
Mode: dev

Log:
  ServiceName: order-api
  Mode: console
  Encoding: json
  Level: debug
  Stat: false

Database:
  Host: localhost
  Port: 3306
  User: root
  Password: root
  DBName: orders_db
  MaxOpenConns: 25
  MaxIdleConns: 10

UserSvc:
  Etcd:
    Hosts:
      - localhost:2379
    Key: user-svc.rpc
  Timeout: 2000
  BalanceName: p2c_ewma

Redis:
  Host: localhost
  Port: 6379
  DB: 0

Auth:
  # 签名密钥，生产环境务必替换！pro/pre 模式使用默认值会拒绝启动
  AccessSecret: change-me-in-production
  # Token 过期时间（秒），86400 = 24h
  AccessExpire: 86400

Prometheus:
  Host: 0.0.0.0
  Port: 9102
  Path: /metrics

Telemetry:
  Endpoint: localhost:4317
  Sampler: 1.0
  Batcher: otlpgrpc

CORS:
  AllowedOrigins:
    - "*"

Kafka:
  BootstrapServers:
    - localhost:9094
    - localhost:9095
    - localhost:9096
  GroupID: order-api
  Topic: user-events
  InventoryTopic: inventory-events
