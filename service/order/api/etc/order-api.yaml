Name: order-api
Host: 0.0.0.0
Port: 8081
Mode: dev

Log:
  ServiceName: order-api
  Mode: console
  Encoding: json
  Level: debug
  Stat: false

Database:
  Host: localhost
  Port: 3306
  User: root
  Password: root
  DBName: orders_db
  MaxOpenConns: 25
  MaxIdleConns: 10

UserSvc:
  Etcd:
    Hosts:
      - localhost:2379
    Key: user-svc.rpc
  Timeout: 2000
  BalanceName: p2c_ewma

Redis:
  Host: localhost
  Port: 6379
  DB: 0

JWT:
  Secret: change-me-in-production
  Expiration: 24h

Prometheus:
  Host: 0.0.0.0
  Port: 9102
  Path: /metrics

Telemetry:
  Endpoint: localhost:4317
  Sampler: 1.0
  Batcher: otlpgrpc

CORS:
  AllowedOrigins:
    - "*"
