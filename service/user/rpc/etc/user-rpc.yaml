Name: user-rpc
ListenOn: 0.0.0.0:9090
Mode: dev

Etcd:
  Hosts:
    - localhost:2379
  Key: user-svc.rpc

Database:
  Host: localhost
  Port: 3306
  User: root
  Password: root
  DBName: users_db
  MaxOpenConns: 25
  MaxIdleConns: 10

Telemetry:
  Endpoint: localhost:4317
  Sampler: 1.0
  Batcher: otlpgrpc

Log:
  ServiceName: user-rpc
  Mode: console
  Encoding: json
  Level: debug
  Stat: false

RedisCache:
  Host: localhost
  Port: 6379
  DB: 0

Cache:
  TTL: 5m
  NegativeTTL: 30s

Prometheus:
  Host: 0.0.0.0
  Port: 9103
  Path: /metrics
