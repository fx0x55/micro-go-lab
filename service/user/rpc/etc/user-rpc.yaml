Name: user-rpc
ListenOn: 0.0.0.0:9090
Mode: dev

# --- 内置开发服务器（devserver.Config） ---
# pprof / healthz / metrics 三合一调试端口。端口与 api 服务错开。
DevServer:
  Enabled: true
  Host: 0.0.0.0
  Port: 6062
  HealthPath: /healthz
  HealthResponse: "OK"
  EnableMetrics: true
  EnablePprof: true

Health: true
Etcd:
  Hosts:
    - localhost:2379
  Key: user-svc.rpc

Database:
  Host: localhost
  Port: 3306
  User: root
  Password: root
  DBName: users_db
  MaxOpenConns: 25
  MaxIdleConns: 10

Telemetry:
  Endpoint: localhost:4317
  Sampler: 1.0
  Batcher: otlpgrpc

Log:
  ServiceName: user-rpc
  Mode: console
  Encoding: json
  Level: debug
  Stat: false

RedisCache:
  Host: localhost
  Port: 6379
  DB: 0

Cache:
  TTL: 5m
  NegativeTTL: 30s

Kafka:
  BootstrapServers:
    - localhost:9094
    - localhost:9095
    - localhost:9096

Prometheus:
  Host: 0.0.0.0
  Port: 9103
  Path: /metrics
