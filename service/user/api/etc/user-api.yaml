Name: user-api
Host: 0.0.0.0
Port: 8080
Mode: dev

Log:
  ServiceName: user-api
  Mode: console
  Encoding: json
  Level: debug
  Stat: false

Database:
  Host: localhost
  Port: 3306
  User: root
  Password: root
  DBName: users_db
  MaxOpenConns: 25
  MaxIdleConns: 10

JWT:
  Secret: change-me-in-production
  Expiration: 24h

Prometheus:
  Host: 0.0.0.0
  Port: 9101
  Path: /metrics

Telemetry:
  Endpoint: localhost:4317
  Sampler: 1.0
  Batcher: otlpgrpc

CORS:
  AllowedOrigins:
    - "*"

Redis:
  Host: localhost
  Port: 6379
  DB: 0
