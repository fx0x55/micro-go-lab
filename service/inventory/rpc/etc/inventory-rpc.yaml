Name: inventory-rpc
ListenOn: 0.0.0.0:9091
Mode: dev

# --- 内置开发服务器（devserver.Config） ---
# pprof / healthz / metrics 三合一调试端口。端口与 api 服务错开。
DevServer:
  Enabled: true
  Host: 0.0.0.0
  Port: 6063
  HealthPath: /healthz
  HealthResponse: "OK"
  EnableMetrics: true
  EnablePprof: true

Health: true
Etcd:
  Hosts:
    - localhost:2379
  Key: inventory-svc.rpc

Database:
  Host: localhost
  Port: 3306
  User: root
  Password: root
  DBName: inventory_db
  MaxOpenConns: 25
  MaxIdleConns: 10

Telemetry:
  Endpoint: localhost:4317
  Sampler: 1.0
  Batcher: otlpgrpc

Log:
  ServiceName: inventory-rpc
  Mode: console
  Encoding: json
  Level: debug
  Stat: false

Kafka:
  BootstrapServers:
    - localhost:9094
    - localhost:9095
    - localhost:9096
  GroupID: inventory-rpc
  Topic: order-events

Prometheus:
  Host: 0.0.0.0
  Port: 9104
  Path: /metrics
