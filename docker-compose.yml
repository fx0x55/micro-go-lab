services:
  # === Infrastructure ===
  etcd:
    image: gcr.io/etcd-development/etcd:v3.5.21
    command: etcd --advertise-client-urls http://0.0.0.0:2379 --listen-client-urls http://0.0.0.0:2379
    ports:
      - "2379:2379"
      - "2380:2380"
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "8589934592"
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 5s
      timeout: 5s
      retries: 5

  # === Databases ===
  users-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: users_db
    ports:
      - "5432:5432"
    volumes:
      - users-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  orders-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: orders_db
    ports:
      - "5433:5432"
    volumes:
      - orders-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # === Services ===
  user-svc:
    build:
      context: .
      target: user-svc
    ports:
      - "8080:8080"
      - "9090:9090"
    depends_on:
      users-db:
        condition: service_healthy
      etcd:
        condition: service_healthy
    environment:
      DATABASE_HOST: users-db
      GRPCCONF_ETCD_HOSTS: "etcd:2379"
      GRPCCONF_ETCD_KEY: "user-svc.rpc"

  order-svc:
    build:
      context: .
      target: order-svc
    ports:
      - "8081:8081"
    depends_on:
      orders-db:
        condition: service_healthy
      user-svc:
        condition: service_started
    environment:
      DATABASE_HOST: orders-db
      USERSVC_ETCD_HOSTS: "etcd:2379"
      USERSVC_ETCD_KEY: "user-svc.rpc"

  # === Monitoring ===
  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9091:9090"
    volumes:
      - ./deployments/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./deployments/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus

  jaeger:
    image: jaegertracing/all-in-one:1.58
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

volumes:
  users-db-data:
  orders-db-data:
