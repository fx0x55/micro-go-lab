services:
  # === Infrastructure ===
  etcd:
    image: gcr.io/etcd-development/etcd:v3.6.13
    command: etcd --advertise-client-urls http://etcd:2379 --listen-client-urls http://0.0.0.0:2379
    ports:
      - "2379:2379"
      - "2380:2380"
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "8589934592"
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 5s
      timeout: 5s
      retries: 5

  # === Databases ===
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: users_db
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./deploy/mysql/init-dbs.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # === Services ===
  user-api:
    build:
      context: .
      target: user-api
    ports:
      - "8080:8080"
      - "9101:9101"
    labels:
      logging: "promtail"
    depends_on:
      mysql:
        condition: service_healthy
      etcd:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_HOST: mysql
      JWT_SECRET: ${JWT_SECRET:-dev-only-secret-do-not-use-in-prod}
      OTLP_ENDPOINT: jaeger:4317
      REDIS_HOST: redis

  user-rpc:
    build:
      context: .
      target: user-rpc
    ports:
      - "9090:9090"
      - "9103:9103"
    labels:
      logging: "promtail"
    depends_on:
      mysql:
        condition: service_healthy
      etcd:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_HOST: mysql
      ETCD_HOSTS: "etcd:2379"
      ETCD_KEY: "user-svc.rpc"
      REDIS_HOST: redis
      OTLP_ENDPOINT: jaeger:4317

  order-api:
    build:
      context: .
      target: order-api
    ports:
      - "8081:8081"
      - "9102:9102"
    labels:
      logging: "promtail"
    depends_on:
      mysql:
        condition: service_healthy
      user-rpc:
        condition: service_started
      redis:
        condition: service_started
    environment:
      DATABASE_HOST: mysql
      USERSVC_ETCD_HOSTS: "etcd:2379"
      USERSVC_ETCD_KEY: "user-svc.rpc"
      JWT_SECRET: ${JWT_SECRET:-dev-only-secret-do-not-use-in-prod}
      OTLP_ENDPOINT: jaeger:4317
      REDIS_HOST: redis

  # === Services (Delve debug mode) ===
  user-api-debug:
    profiles: ["debug"]
    build:
      context: .
      target: user-api-debug
    ports:
      - "8080:8080"
      - "40001:40001"
    depends_on:
      mysql:
        condition: service_healthy
      etcd:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_HOST: mysql
      JWT_SECRET: ${JWT_SECRET:-dev-only-secret-do-not-use-in-prod}
      REDIS_HOST: redis

  user-rpc-debug:
    profiles: ["debug"]
    build:
      context: .
      target: user-rpc-debug
    ports:
      - "9090:9090"
      - "40002:40002"
    depends_on:
      mysql:
        condition: service_healthy
      etcd:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_HOST: mysql
      ETCD_HOSTS: "etcd:2379"
      ETCD_KEY: "user-svc.rpc"
      REDIS_HOST: redis

  order-api-debug:
    profiles: ["debug"]
    build:
      context: .
      target: order-api-debug
    ports:
      - "8081:8081"
      - "40003:40003"
    depends_on:
      mysql:
        condition: service_healthy
      user-rpc:
        condition: service_started
      redis:
        condition: service_started
    environment:
      DATABASE_HOST: mysql
      USERSVC_ETCD_HOSTS: "etcd:2379"
      USERSVC_ETCD_KEY: "user-svc.rpc"
      JWT_SECRET: ${JWT_SECRET:-dev-only-secret-do-not-use-in-prod}
      REDIS_HOST: redis

  # === Monitoring (docker compose --profile monitoring up) ===
  alertmanager:
    profiles: ["monitoring"]
    image: prom/alertmanager:v0.33.0
    ports:
      - "9093:9093"
    volumes:
      - ./deploy/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml.template:ro
      - ./deploy/alertmanager/telegram.tmpl:/etc/alertmanager/telegram.tmpl:ro
    env_file: .env
    entrypoint: ["sh", "-c"]
    command:
      - >-
        awk -v bot="$$TELEGRAM_BOT_TOKEN" -v cid="$$TELEGRAM_CHAT_ID"
        "{gsub(/\\$\\{TELEGRAM_BOT_TOKEN\\}/,bot);gsub(/\\$\\{TELEGRAM_CHAT_ID\\}/,cid)}1"
        /etc/alertmanager/alertmanager.yml.template > /tmp/am.yml &&
        exec /bin/alertmanager --config.file=/tmp/am.yml --storage.path=/alertmanager
    restart: unless-stopped

  prometheus:
    profiles: ["monitoring"]
    image: prom/prometheus:v3.13.0
    ports:
      - "9091:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/prometheus/rules.yml:/etc/prometheus/rules.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.external-url=http://localhost:9091"
      - "--web.enable-lifecycle"
    depends_on:
      - alertmanager

  grafana:
    profiles: ["monitoring"]
    image: grafana/grafana:13.1.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
      - loki

  jaeger:
    profiles: ["monitoring"]
    image: jaegertracing/jaeger:2.19.0
    ports:
      - "16686:16686" # Jaeger UI
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP

  loki:
    profiles: ["monitoring"]
    image: grafana/loki:3.7.3
    ports:
      - "3100:3100"
    volumes:
      - ./deploy/loki/config.yml:/etc/loki/config.yml:ro
      - ./deploy/loki/rules:/etc/loki/rules:ro
    command: -config.file=/etc/loki/config.yml
    depends_on:
      - alertmanager

  promtail:
    profiles: ["monitoring"]
    image: grafana/promtail:3.5.5
    volumes:
      - ./deploy/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

volumes:
  mysql-data:
