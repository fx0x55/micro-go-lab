services:
  # === Infrastructure ===
  etcd:
    image: gcr.io/etcd-development/etcd:v3.5.31
    command: etcd --advertise-client-urls http://0.0.0.0:2379 --listen-client-urls http://0.0.0.0:2379
    ports:
      - "2379:2379"
      - "2380:2380"
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "8589934592"
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 5s
      timeout: 5s
      retries: 5

  # === Databases ===
  users-db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: users_db
    ports:
      - "5432:5432"
    volumes:
      - users-db-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  orders-db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: orders_db
    ports:
      - "5433:5432"
    volumes:
      - orders-db-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # === Services ===
  user-api:
    build:
      context: .
      target: user-api
    ports:
      - "8080:8080"
      - "9101:9101"
    depends_on:
      users-db:
        condition: service_healthy
      etcd:
        condition: service_healthy
    environment:
      DATABASE_HOST: users-db
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      OTLP_ENDPOINT: jaeger:4317

  user-rpc:
    build:
      context: .
      target: user-rpc
    ports:
      - "9090:9090"
    depends_on:
      users-db:
        condition: service_healthy
      etcd:
        condition: service_healthy
    environment:
      DATABASE_HOST: users-db
      ETCD_HOSTS: "etcd:2379"
      ETCD_KEY: "user-svc.rpc"
      OTLP_ENDPOINT: jaeger:4317

  order-api:
    build:
      context: .
      target: order-api
    ports:
      - "8081:8081"
      - "9102:9102"
    depends_on:
      orders-db:
        condition: service_healthy
      user-rpc:
        condition: service_started
    environment:
      DATABASE_HOST: orders-db
      USERSVC_ETCD_HOSTS: "etcd:2379"
      USERSVC_ETCD_KEY: "user-svc.rpc"
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      OTLP_ENDPOINT: jaeger:4317

  # === Monitoring ===
  prometheus:
    image: prom/prometheus:v3.5.3
    ports:
      - "9091:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:13.0.2
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus

  jaeger:
    image: jaegertracing/jaeger:2.19.0
    ports:
      - "16686:16686" # Jaeger UI
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP

volumes:
  users-db-data:
  orders-db-data:
