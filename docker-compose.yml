services:
  # === Infrastructure ===
  etcd:
    image: gcr.io/etcd-development/etcd:v3.5.31
    command: etcd --advertise-client-urls http://0.0.0.0:2379 --listen-client-urls http://0.0.0.0:2379
    ports:
      - "2379:2379"
      - "2380:2380"
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "8589934592"
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 5s
      timeout: 5s
      retries: 5

  # === Databases ===
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: users_db
      POSTGRES_EXTRA_DBS: orders_db
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql
      - ./deploy/postgres/init-dbs.sh:/docker-entrypoint-initdb.d/init-dbs.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # === Services ===
  user-api:
    build:
      context: .
      target: user-api
    ports:
      - "8080:8080"
      - "9101:9101"
    labels:
      logging: "promtail"
    depends_on:
      postgres:
        condition: service_healthy
      etcd:
        condition: service_healthy
    environment:
      DATABASE_HOST: postgres
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      OTLP_ENDPOINT: jaeger:4317

  user-rpc:
    build:
      context: .
      target: user-rpc
    ports:
      - "9090:9090"
    labels:
      logging: "promtail"
    depends_on:
      postgres:
        condition: service_healthy
      etcd:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_HOST: postgres
      ETCD_HOSTS: "etcd:2379"
      ETCD_KEY: "user-svc.rpc"
      REDIS_HOST: redis
      OTLP_ENDPOINT: jaeger:4317

  order-api:
    build:
      context: .
      target: order-api
    ports:
      - "8081:8081"
      - "9102:9102"
    labels:
      logging: "promtail"
    depends_on:
      postgres:
        condition: service_healthy
      user-rpc:
        condition: service_started
    environment:
      DATABASE_HOST: postgres
      USERSVC_ETCD_HOSTS: "etcd:2379"
      USERSVC_ETCD_KEY: "user-svc.rpc"
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      OTLP_ENDPOINT: jaeger:4317

  # === Monitoring ===
  prometheus:
    image: prom/prometheus:v3.5.3
    ports:
      - "9091:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/prometheus/rules.yml:/etc/prometheus/rules.yml:ro

  grafana:
    image: grafana/grafana:13.0.2
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
      - loki

  jaeger:
    image: jaegertracing/jaeger:2.19.0
    ports:
      - "16686:16686" # Jaeger UI
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP

  loki:
    image: grafana/loki:3.5.5
    ports:
      - "3100:3100"
    volumes:
      - ./deploy/loki/config.yml:/etc/loki/config.yml:ro
    command: -config.file=/etc/loki/config.yml

  promtail:
    image: grafana/promtail:3.5.5
    volumes:
      - ./deploy/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

volumes:
  pg-data:
