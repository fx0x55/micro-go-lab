services:
  # === Databases ===
  users-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: users_db
    ports:
      - "5432:5432"
    volumes:
      - users-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  orders-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: orders_db
    ports:
      - "5433:5432"
    volumes:
      - orders-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # === Services ===
  user-svc:
    build:
      context: .
      target: user-svc
    ports:
      - "8080:8080"
      - "9090:9090"
    depends_on:
      users-db:
        condition: service_healthy
    environment:
      DATABASE_HOST: users-db
      TELEMETRY_ENABLED: "true"
      TELEMETRY_ENDPOINT: "jaeger:4317"

  order-svc:
    build:
      context: .
      target: order-svc
    ports:
      - "8081:8081"
    depends_on:
      orders-db:
        condition: service_healthy
      user-svc:
        condition: service_started
    environment:
      DATABASE_HOST: orders-db
      USER_SVC_GRPC_ADDR: "user-svc:9090"
      TELEMETRY_ENABLED: "true"
      TELEMETRY_ENDPOINT: "jaeger:4317"

  # === Monitoring ===
  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9091:9090"
    volumes:
      - ./deployments/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./deployments/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus

  jaeger:
    image: jaegertracing/all-in-one:1.58
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

volumes:
  users-db-data:
  orders-db-data:
